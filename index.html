<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desvie dos Obstaculos</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, #28458b 0%, #111a33 45%, #0a0f1e 100%);
      color: #f4f7ff;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 40px;
    }

    .hero {
      padding: 28px;
      border: 1px solid rgba(170, 195, 255, 0.28);
      border-radius: 28px;
      background: rgba(10, 18, 40, 0.82);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
    }

    .tag {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(92, 127, 255, 0.18);
      color: #c9d7ff;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(32px, 5vw, 52px);
    }

    .hero p {
      max-width: 650px;
      margin: 0;
      color: #d9e3ff;
      font-size: 18px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .button,
    .button-secondary {
      padding: 12px 18px;
      border-radius: 14px;
      font-weight: bold;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .button {
      background: #7be38f;
      color: #102616;
    }

    .button-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #f4f7ff;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .button:hover,
    .button-secondary:hover {
      transform: translateY(-2px);
    }

    .game-shell {
      margin-top: 24px;
      padding: 18px;
      border-radius: 28px;
      background: rgba(8, 14, 30, 0.82);
      border: 1px solid rgba(170, 195, 255, 0.22);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
    }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .game-header h2 {
      margin: 0 0 6px;
      font-size: 22px;
    }

    .game-header p {
      margin: 0;
      color: #cbd7f7;
    }

    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 224, 102, 0.16);
      color: #ffe790;
      font-size: 14px;
      font-weight: bold;
      white-space: nowrap;
    }

    #game-container {
      display: flex;
      justify-content: center;
    }

    canvas {
      display: block;
      width: min(100%, 800px) !important;
      height: auto !important;
      border-radius: 22px;
      border: 1px solid rgba(174, 198, 255, 0.28);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    @media (max-width: 820px) {
      .page {
        padding: 20px 14px 30px;
      }

      .hero,
      .game-shell {
        padding: 18px;
        border-radius: 22px;
      }

      .game-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .hero p,
      .game-header p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
